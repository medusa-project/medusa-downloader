worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;

    keepalive_timeout  3600;
    send_timeout 3600;
    proxy_read_timeout 3600;

    server{
        listen 8081;
        server_name  localhost;
        location ^~ / {
            root /var/www/html;
        }
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}