services:
  postgres:
    image: postgres:12-alpine
    environment:
      POSTGRES_DB: downloader
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    hostname: postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -h localhost -p 5432" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
